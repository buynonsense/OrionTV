name: Build Release Assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android_release:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Read app version
        id: package_version
        run: |
          VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build Android release APK
        run: yarn build

      - name: Prepare Android artifacts
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release.apk "artifacts/OrionTV-${{ steps.package_version.outputs.version }}-android.apk"
          shasum -a 256 "artifacts/OrionTV-${{ steps.package_version.outputs.version }}-android.apk" > "artifacts/OrionTV-${{ steps.package_version.outputs.version }}-android.apk.sha256"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-assets
          path: artifacts/*
          if-no-files-found: error

  ios_release:
    name: Build iOS IPA
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Read app version
        id: package_version
        run: |
          VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Prebuild iOS project
        run: yarn prebuild-mobile --platform ios

      - name: Install CocoaPods dependencies
        run: pod install
        working-directory: ios

      - name: Build unsigned iOS app
        run: |
          xcodebuild \
            -workspace ios/OrionTV.xcworkspace \
            -scheme OrionTV \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$RUNNER_TEMP/oriontv-ios-build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Prepare iOS artifacts
        run: |
          VERSION="${{ steps.package_version.outputs.version }}"
          APP_PATH="$RUNNER_TEMP/oriontv-ios-build/Build/Products/Release-iphoneos/OrionTV.app"

          mkdir -p artifacts/Payload
          cp -R "$APP_PATH" artifacts/Payload/OrionTV.app
          ditto -c -k --sequesterRsrc --keepParent artifacts/Payload "artifacts/OrionTV-${VERSION}-ios-unsigned.ipa"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "artifacts/OrionTV-${VERSION}-ios-app.zip"
          shasum -a 256 "artifacts/OrionTV-${VERSION}-ios-unsigned.ipa" > "artifacts/OrionTV-${VERSION}-ios-unsigned.ipa.sha256"
          shasum -a 256 "artifacts/OrionTV-${VERSION}-ios-app.zip" > "artifacts/OrionTV-${VERSION}-ios-app.zip.sha256"

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-assets
          path: artifacts/*
          if-no-files-found: error

  publish_release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - android_release
      - ios_release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release-assets
          path: release-assets

      - name: Download iOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: ios-release-assets
          path: release-assets

      - name: Resolve release metadata
        id: release_meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          else
            VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
            TAG_NAME="v${VERSION}"
          fi
          VERSION="${TAG_NAME#v}"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: Release ${{ steps.release_meta.outputs.tag_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
